#
# CI — Tests & Checks
#
# Runs on every push and every PR.
# - Lint (cargo clippy + rustfmt)
# - Rust unit tests (cargo test)
# - Python integration tests (pytest)
# - Build check (maturin build)
#

name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust lint + fmt
  rust-lint:
    name: Rust Lint & Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Rust unit tests
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --all-features

  # Python integration tests  
  python-tests:
    name: Python Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: rust-lint
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build and install Ryx
        run: uv run maturin develop --release

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short

      - name: Run examples smoke test
        run: |
          for f in examples/*.py; do
            echo "Running $f ..."
            uv run python "$f"
          done

  # Maturin build check
  build-check:
    name: Build Check (wheel)
    runs-on: ubuntu-latest
    needs: [rust-tests, python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist/
