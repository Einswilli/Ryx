# Example ryx configuration file (YAML format)
# Copy to ryx.yaml in your project root

database:
  url: "sqlite:///dev.db"
  pool:
    max_connections: 5
    min_connections: 1
    connect_timeout: 10
    idle_timeout: 300
    max_lifetime: 900

debug:
  verbose: true

# Environment-specific configs:
# Use --env prod to activate the [prod] section
# Values in environment sections override base values

dev:
  database:
    url: "sqlite:///dev.db"
  debug:
    verbose: true

test:
  database:
    url: "sqlite:///test.db"
    pool:
      max_connections: 2

prod:
  database:
    url: "postgres://user:pass@prod-server/mydb"
    pool:
      max_connections: 20
      min_connections: 5